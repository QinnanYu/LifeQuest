<section class="card habits-form">
  <h3>Log Your Daily Habits</h3>
  <form>
    <div class="form-group">
      <label for="sleep">Sleep Time (hours):</label>
      <input 
        type="number" 
        id="sleep" 
        name="sleep" 
        min="0" 
        max="24" 
        step="0.5" 
        placeholder="e.g. 7.5" 
        required>
    </div>

    <div class="form-group">
      <label for="water">Water Intake (ml):</label>
      <input 
        type="number" 
        id="water" 
        name="water" 
        min="0" 
        max="5000" 
        placeholder="e.g. 2000">
    </div>

    <div class="form-group">
      <fieldset>
        <legend>Physical Activity Today</legend>
        <p><input type="radio" id="exercise-run" name="exercise" value="running"><label for="exercise-run">Running</label></p>
        <p><input type="radio" id="exercise-walk" name="exercise" value="walking"><label for="exercise-walk">Walking</label></p>
        <p><input type="radio" id="exercise-strength" name="exercise" value="strength"><label for="exercise-strength">Strength Training</label></p>
        <p><input type="radio" id="exercise-other" name="exercise" value="other"><label for="exercise-other">Other</label></p>
        <p><input type="radio" id="exercise-none" name="exercise" value="none" checked><label for="exercise-none">No Activity</label></p>
      </fieldset>
    </div>

    <div class="form-group">
      <label for="meals">Number of Healthy Meals:</label>
      <select id="meals" name="meals">
        <option value="" selected disabled>Select an option</option>
        <option value="1">1 Meal</option>
        <option value="2">2 Meals</option>
        <option value="3">3+ Meals</option>
      </select>
    </div>

    <div class="form-group">
      <label for="notes">Wellness Notes (optional):</label>
      <textarea 
        id="notes" 
        name="notes" 
        rows="6" 
        placeholder="How did you feel today? Any mental wellness activities (meditation, reading)?"></textarea>
    </div>

    <div class="form-group">
      <button type="submit" class="btn">Save My Habits</button>
    </div>
  </form>
</section>
